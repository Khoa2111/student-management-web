<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#1a252f"/>

  <!-- Desk -->
  <rect x="150" y="280" width="500" height="16" rx="4" fill="#2c3e50"/>
  <rect x="190" y="296" width="18" height="70" rx="3" fill="#2c3e50"/>
  <rect x="592" y="296" width="18" height="70" rx="3" fill="#2c3e50"/>

  <!-- Monitor -->
  <rect x="270" y="160" width="260" height="170" rx="8" fill="#34495e"/>
  <rect x="278" y="168" width="244" height="146" rx="4" fill="#ecf0f1"/>
  <!-- Screen content lines -->
  <rect x="295" y="182" width="120" height="10" rx="3" fill="#2980b9"/>
  <rect x="295" y="200" width="200" height="8" rx="3" fill="#bdc3c7"/>
  <rect x="295" y="214" width="160" height="8" rx="3" fill="#bdc3c7"/>
  <rect x="295" y="228" width="180" height="8" rx="3" fill="#bdc3c7"/>
  <rect x="295" y="242" width="140" height="8" rx="3" fill="#bdc3c7"/>
  <!-- Table rows -->
  <rect x="295" y="258" width="206" height="1" fill="#e0e0e0"/>
  <rect x="295" y="270" width="206" height="8" rx="2" fill="#eaf4fb"/>
  <rect x="295" y="281" width="206" height="8" rx="2" fill="#f5f5f5"/>
  <!-- Monitor stand -->
  <rect x="385" y="330" width="30" height="14" rx="2" fill="#2c3e50"/>
  <rect x="360" y="344" width="80" height="8" rx="3" fill="#2c3e50"/>

  <!-- Books stack on left -->
  <rect x="170" y="242" width="70" height="14" rx="3" fill="#e74c3c"/>
  <rect x="174" y="228" width="62" height="14" rx="3" fill="#f39c12"/>
  <rect x="170" y="214" width="70" height="14" rx="3" fill="#27ae60"/>

  <!-- Graduation cap -->
  <ellipse cx="640" cy="130" rx="50" ry="14" fill="#2980b9"/>
  <rect x="626" y="108" width="28" height="22" rx="2" fill="#2980b9"/>
  <polygon points="614,130 640,116 666,130 640,144" fill="#1a252f"/>
  <ellipse cx="640" cy="130" rx="50" ry="14" fill="none" stroke="#3498db" stroke-width="2"/>
  <!-- Cap tassel -->
  <line x1="670" y1="130" x2="685" y2="155" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
  <circle cx="685" cy="158" r="5" fill="#f39c12"/>

  <!-- Student figure (simplified) -->
  <circle cx="580" cy="200" r="24" fill="#f5cba7"/>
  <rect x="556" y="226" width="48" height="55" rx="6" fill="#2980b9"/>
  <rect x="540" y="230" width="18" height="38" rx="5" fill="#2980b9"/>
  <rect x="602" y="230" width="18" height="38" rx="5" fill="#2980b9"/>
  <rect x="562" y="280" width="18" height="40" rx="5" fill="#1a252f"/>
  <rect x="578" y="280" width="18" height="40" rx="5" fill="#1a252f"/>

  <!-- Floating data points -->
  <circle cx="100" cy="100" r="6" fill="#3498db" opacity="0.7"/>
  <circle cx="130" cy="60" r="4" fill="#27ae60" opacity="0.7"/>
  <circle cx="720" cy="80" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="750" cy="200" r="7" fill="#f39c12" opacity="0.6"/>
  <circle cx="80" cy="300" r="4" fill="#9b59b6" opacity="0.6"/>

  <!-- Title text -->
  <text x="400" y="60" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="700"
        fill="#ffffff" text-anchor="middle">Student Management System</text>
  <text x="400" y="88" font-family="'Segoe UI',Arial,sans-serif" font-size="14"
        fill="#bdc3c7" text-anchor="middle">Quản lý sinh viên toàn diện – Dễ dùng, hiệu quả</text>
</svg>
